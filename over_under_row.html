<!-- 大小球输入行 -->
<div class="score-input-row over-under-row" style="margin-top:8px">
    <span class="score-label">大小球:</span>
    <input type="number" class="score-input" id="over-odds-{match_id}" min="0" max="10" step="0.01" placeholder="大球水位" style="width:90px;padding:4px;border:1px solid #ccc;border-radius:3px">
    <input type="number" class="score-input" id="ou-line-{match_id}" min="0" max="10" step="0.1" placeholder="大小球数值" style="width:90px;padding:4px;border:1px solid #ccc;border-radius:3px;margin-left:5px">
    <input type="number" class="score-input" id="under-odds-{match_id}" min="0" max="10" step="0.01" placeholder="小球水位" style="width:90px;padding:4px;border:1px solid #ccc;border-radius:3px;margin-left:5px">
    <button class="btn-save-score" onclick="saveOverUnder('{match_id}')" style="margin-left:5px">💾 保存</button>
</div>
